<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebUtils</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  
  <style>
  * { box-sizing: border-box; }
  body {
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 15px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  h1 { text-align: center; }
  .tools {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(min(100%, 280px), 1fr));
    gap: 15px;
    max-width: 1000px;
    margin: 0 auto;
    width: 100%;
  }
  .tool-card {
    border: 1px solid #ccc;
    padding: 20px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
  }
  .tool-icon { font-size: 2rem; margin-bottom: 10px; }
  .tool-name { font-weight: bold; font-size: 1.2rem; margin-bottom: 5px; }
  .tool-desc { flex: 1; font-size: 0.9rem; }
  .tool-link {
    margin-top: 15px;
    padding: 8px;
    background: #eee;
    text-align: center;
    border-radius: 4px;
  }
</style>

</head>
<body>
  <h1>WebUtils</h1>
  
  <div class="tools" id="tools-container">
    <div class="loading">Loading tools...</div>
  </div>

  <script>
    async function loadTools() {
      const container = document.getElementById('tools-container');
      const res = await fetch('tools.json');
      const tools = await res.json();
      
      container.innerHTML = '';
      tools.sort((a, b) => a.name.localeCompare(b.name));
      
      tools.forEach(tool => {
        const card = document.createElement('a');
        card.href = `${tool.folder}/`;
        card.className = 'tool-card';
        card.innerHTML = `
          <div class="tool-icon"><i class="${tool.icon || 'fas fa-toolbox'}"></i></div>
          <div class="tool-name">${tool.name}</div>
          <div class="tool-desc">${tool.description || ''}</div>
          <span class="tool-link">Open Tool →</span>
        `;
        container.appendChild(card);
      });
    }
    window.onload = loadTools;
  </script>
</body>
</html>
