<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickSGR</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0a0a;color:#eaeaea;font-family:system-ui,sans-serif;padding:15px;display:flex;flex-direction:column;align-items:center;min-height:100vh}
    header{width:100%;max-width:600px;display:flex;justify-content:space-between;align-items:center;margin:8px 0 20px}
    h2{font-size:1.5rem;font-weight:700;text-align:center;flex:1;margin-right:40px}
    .header-btn{color:#aaa;padding:8px;font-size:1.3rem;text-decoration:none;transition:color .2s}
    .header-btn:hover{color:#fff}
    main{width:100%;max-width:600px;display:flex;flex-direction:column;gap:18px}
    .card{background:#111;border:1px solid #333;border-radius:8px;padding:18px;display:flex;flex-direction:column;gap:14px}
    .card-title{font-size:1.1rem;font-weight:600;color:#ddd;display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;border-bottom:1px solid #222}
    .title-left{display:flex;align-items:center;gap:8px}
    button{padding:12px 18px;background:#222;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:500;transition:background .2s}
    button:hover{background:#333}
    button:disabled{opacity:.5;cursor:not-allowed}
    input{width:100%;padding:12px 16px;background:#1a1a1a;color:#fff;border:1px solid #333;border-radius:8px;font-size:16px;text-align:center}
    input[type=number]{-moz-appearance:textfield}
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
    input:focus{border-color:#555;outline:none}
    .add-row{display:flex;gap:10px}
    .add-row input{flex:1}
    .locator-display{display:flex;align-items:center;justify-content:space-between;background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:16px}
    .arrow-container{font-size:2.2rem;color:#aaa;width:60px;height:60px;display:flex;align-items:center;justify-content:center;transition:transform .3s}
    #log{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:14px;font-family:monospace;font-size:13px;height:110px;overflow-y:auto;color:#aaa;white-space:pre-wrap}
    .voucher-header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #222;padding-bottom:8px;margin-top:4px}
    .voucher-title{font-size:13px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px}
    .voucher-total{font-size:15px;font-weight:700;color:#ddd;display:flex;align-items:center;gap:8px}
    .voucher-list{display:flex;flex-direction:column;gap:10px}
    .voucher{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:14px;display:flex;justify-content:space-between;align-items:center}
    .voucher:hover{border-color:#555}
    .v-details{display:flex;flex-direction:column;gap:4px}
    .v-val{font-size:20px;font-weight:700;color:#fff}
    .v-meta{font-size:13px;color:#888;display:flex;flex-direction:column;gap:2px}
    .v-meta .time{transition:color .2s}
    .v-meta.expired .time{color:#ff4444;font-weight:600}
    .btn-del{width:36px;height:36px;border-radius:6px;background:#222;border:none;color:#aaa}
    .btn-del:hover{background:#333;color:#fff}
    #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:#222;color:#fff;border:1px solid #444;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;z-index:1000}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<header>
    <a href="https://zyg0t.github.io/WebUtils/" class="header-btn"><i class="fas fa-shapes"></i></a>
    <h2>QuickSGR</h2>
</header>
<main>
  <section class="card">
    <div class="card-title"><div class="title-left"><i class="fas fa-location-arrow"></i> Nearest SGR</div></div>
    <div class="locator-display" id="locator-display" style="display:none">
      <div><div class="locator-name" id="nearest-name">Scanning...</div><div class="locator-dist" id="nearest-dist">-- m</div></div>
      <div class="arrow-container" id="direction-arrow"><i class="fas fa-arrow-up"></i></div>
    </div>
    <button id="startTrackerBtn"><i class="fas fa-satellite-dish"></i> Start Tracking</button>
  </section>

  <section class="card">
    <div class="card-title"><div class="title-left"><i class="fas fa-database"></i> Database Extractor</div><span class="update-time" id="last-update"></span></div>
    <button id="startBtn"><i class="fas fa-cloud-arrow-down"></i> Extract Data</button>
    <pre id="log">Ready...</pre>
    <div class="btn-row dl-ops" id="dl" style="display:none;gap:10px;flex-wrap:wrap">
      <button onclick="saveData('gpx')">GPX</button>
      <button onclick="saveData('csv')">CSV</button>
      <button onclick="saveData('json')">GeoJSON</button>
    </div>
  </section>

    <section class="card">
    <div class="card-title"><div class="title-left"><i class="fas fa-wallet"></i> Voucher Wallet</div></div>

    <div class="add-row">
      <input type="text" id="amountInput" placeholder="Enter amount (RON)" inputmode="decimal">
      <button onclick="addVoucher()"><i class="fas fa-plus"></i> Add</button>
    </div>

    <div class="voucher-header">
      <span class="voucher-title">Saved Vouchers</span>
      <span class="voucher-total" id="voucher-total"><i class="fas fa-shopping-cart"></i> 0.00 RON</span>
    </div>
    <div class="voucher-list" id="voucher-list"></div>
    </section>
</main>
<div id="toast"></div>

<script>
const PROXY = "https://corsproxy.lmarkyos.workers.dev/?url=";
const RAD = 15;
let sgrNodes = JSON.parse(localStorage.getItem('sgr_nodes')) || [];
let vouchers = JSON.parse(localStorage.getItem('sgr_vouchers')) || [];
const $ = id => document.getElementById(id);

const toast = msg => {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t.timer);
    t.timer = setTimeout(() => t.classList.remove('show'), 2200);
};

const dist = (la1, lo1, la2, lo2) => {
    const p = Math.PI / 180;
    return 12742 * Math.asin(Math.sqrt(
        0.5 - Math.cos((la2 - la1) * p) / 2 +
        Math.cos(la1 * p) * Math.cos(la2 * p) * (1 - Math.cos((lo2 - lo1) * p)) / 2
    ));
};

const calcBearing = (la1, lo1, la2, lo2) => {
    const r = Math.PI / 180;
    const d = (lo2 - lo1) * r;
    return (Math.atan2(
        Math.sin(d) * Math.cos(la2 * r),
        Math.cos(la1 * r) * Math.sin(la2 * r) - Math.sin(la1 * r) * Math.cos(la2 * r) * Math.cos(d)
    ) * (180 / Math.PI) + 360) % 360;
};

const getFreshPos = () => new Promise((res, rej) =>
    navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true })
);

const log = m => {
    const el = $('log');
    el.textContent += `> ${m}\n`;
    el.scrollTop = el.scrollHeight;
};

if (sgrNodes.length) {
    $('dl').style.display = 'flex';
    const t = localStorage.getItem('sgr_nodes_updated');
    if (t) $('last-update').textContent = `Updated: ${t}`;
}

$('startBtn').onclick = async () => {
    if (!navigator.geolocation) return toast("Geolocation not supported");
    $('startBtn').disabled = true;
    $('dl').style.display = 'none';
    $('log').textContent = '';
    sgrNodes = [];
    try {
        log("Acquiring position...");
        const pos = await getFreshPos();
        const uLat = pos.coords.latitude;
        const uLon = pos.coords.longitude;
        log("Fetching nodes...");
        const all = await (await fetch(PROXY + encodeURIComponent('https://sgrstatus.ro/wp-json/custom/v1/locations/'))).json();
        const f = all.filter(l => dist(uLat, uLon, l.latitude, l.longitude) <= RAD);
        log(`Found ${f.length} nodes`);
        for (let [i, l] of f.entries()) {
            const res = await (await fetch(PROXY + encodeURIComponent(
                `https://sgrstatus.ro/wp-json/custom/v1/location_info/?lat=${l.latitude}&lon=${l.longitude}`
            ))).json();
            sgrNodes.push({
                name: res.name || "Node",
                status: res.status || "N/A",
                lat: l.latitude,
                lon: l.longitude
            });
            if (i % 5 === 0) log(`Processed ${i + 1}/${f.length}`);
        }
        const now = new Date().toLocaleString('en-GB', { hour12: false });
        localStorage.setItem('sgr_nodes', JSON.stringify(sgrNodes));
        localStorage.setItem('sgr_nodes_updated', now);
        $('last-update').textContent = `Updated: ${now}`;
        $('dl').style.display = 'flex';
        log("Done.");
    } catch (e) {
        log("Error: " + (e.message || "Failed"));
        if (localStorage.getItem('sgr_nodes')) $('dl').style.display = 'flex';
    }
    $('startBtn').disabled = false;
};

window.saveData = t => {
    let content, mimeType, filename = `sgr.${t}`;
    if (t === 'gpx') {
        mimeType = 'application/gpx+xml';
        content = `<?xml version="1.1"?><gpx>${sgrNodes.map(l =>
            `<wpt lat="${l.lat}" lon="${l.lon}"><name>${l.name}</name></wpt>`
        ).join('')}</gpx>`;
    } else if (t === 'csv') {
        mimeType = 'text/csv';
        content = "Name,Status,Lat,Lon\n" + sgrNodes.map(l =>
            `"${l.name}","${l.status}",${l.lat},${l.lon}`
        ).join('\n');
    } else {
        mimeType = 'application/json';
        content = JSON.stringify({
            type: "FeatureCollection",
            features: sgrNodes.map(l => ({
                type: "Feature",
                geometry: { type: "Point", coordinates: [l.lon, l.lat] },
                properties: { name: l.name, status: l.status }
            }))
        });
    }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([content], { type: mimeType }));
    a.download = filename;
    a.click();
};

let userPos = null;
let curHeading = 0;
const updateLoc = () => {
    if (!userPos || !sgrNodes.length) return;
    let near = null;
    let minD = Infinity;
    sgrNodes.forEach(n => {
        const d = dist(userPos.lat, userPos.lon, n.lat, n.lon);
        if (d < minD) {
            minD = d;
            near = n;
        }
    });
    if (near) {
        $('nearest-name').textContent = near.name;
        $('nearest-dist').textContent = minD < 1
            ? `${Math.round(minD * 1000)}m`
            : `${minD.toFixed(2)}km`;
        $('direction-arrow').style.transform = `rotate(${calcBearing(userPos.lat, userPos.lon, near.lat, near.lon) - curHeading}deg)`;
    }
};

$('startTrackerBtn').onclick = async () => {
    $('startTrackerBtn').style.display = 'none';
    $('locator-display').style.display = 'flex';
    const handleOri = e => {
        curHeading = e.webkitCompassHeading || (360 - e.alpha);
        updateLoc();
    };
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
            if (await DeviceOrientationEvent.requestPermission() === 'granted') {
                window.addEventListener('deviceorientation', handleOri);
            }
        } catch (e) {}
    } else {
        window.addEventListener('deviceorientationabsolute', handleOri);
    }
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(p => {
            userPos = { lat: p.coords.latitude, lon: p.coords.longitude };
            updateLoc();
        }, () => toast("Location error"), { enableHighAccuracy: true });
    }
};

const formatTimeSince = (ts) => {
    const now = Date.now();
    const diffMs = now - ts;
    const diffMin = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMin / 60);
    const diffDays = Math.floor(diffHours / 24);
    const diffMonths = Math.floor(diffDays / 30);

    let text = '';
    let isExpired = false;

    if (diffMonths >= 12) {
        text = 'Expired';
        isExpired = true;
    } else if (diffMonths > 0) {
        text = `${diffMonths} month${diffMonths > 1 ? 's' : ''} ago`;
    } else if (diffDays > 0) {
        text = `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;
    } else if (diffHours > 0) {
        text = `${diffHours} hour${diffHours > 1 ? 's' : ''} ago`;
    } else if (diffMin > 0) {
        text = `${diffMin} minute${diffMin > 1 ? 's' : ''} ago`;
    } else {
        text = 'Just now';
    }

    return { text, isExpired };
};

const addVoucher = () => {
    const input = $('amountInput');
    let amtStr = input.value.trim().replace(',', '.');

    if (!amtStr) {
        toast("Please enter an amount");
        return;
    }

    const amount = parseFloat(amtStr);
    if (isNaN(amount) || amount <= 0) {
        toast("Invalid amount");
        return;
    }

    vouchers.unshift({
        id: Date.now().toString(),
        amount: amount.toFixed(2),
        ts: Date.now()
    });

    localStorage.setItem('sgr_vouchers', JSON.stringify(vouchers));
    renderVouchers();
    input.value = '';
    toast(`Added ${amount.toFixed(2)} RON`);
};

const renderVouchers = () => {
    const total = vouchers.reduce((s, v) => s + parseFloat(v.amount), 0).toFixed(2);
    $('voucher-total').innerHTML = `<i class="fas fa-shopping-cart"></i> ${total} RON`;

    $('voucher-list').innerHTML = vouchers.length ? vouchers.map(v => {
        const { text, isExpired } = formatTimeSince(v.ts);
        const addedDate = new Date(v.ts).toLocaleDateString('en-GB');
        return `
            <div class="voucher">
                <div class="v-details">
                    <div class="v-val">${v.amount} RON</div>
                    <div class="v-meta ${isExpired ? 'expired' : ''}">
                        <span>${addedDate}</span>
                        <span class="time">${text}</span>
                    </div>
                </div>
                <button class="btn-del" onclick="delV('${v.id}')">
                    <i class="fas fa-times"></i>
                </button>
            </div>`;
    }).join('') : '<div style="color:#666;font-size:14px;text-align:center;padding:40px 0">No vouchers yet.<br>Add one above.</div>';
};

window.delV = id => {
    vouchers = vouchers.filter(v => v.id !== id);
    localStorage.setItem('sgr_vouchers', JSON.stringify(vouchers));
    renderVouchers();
};

$('amountInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') addVoucher();
});

renderVouchers();
</script>
</body>
</html>
