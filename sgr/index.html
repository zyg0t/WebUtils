<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>📍 Iași SGR to GPX</title>

    <style>
        :root {
            --accent: #58a6ff;
            --bg1: #161b22;
            --bg2: #010409;
            --text: #e6e6e6;
            --muted: #8b949e;
            --card-bg: rgba(22, 27, 34, 0.8);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0;
            min-height: 100vh;
            font-family: Inter, Roboto, "Helvetica Neue", sans-serif;
            background: radial-gradient(circle at center, var(--bg1), var(--bg2));
            background-attachment: fixed;
            color: var(--text); color-scheme: dark; -webkit-font-smoothing: antialiased;
            display: flex; flex-direction: column; align-items: center;
        }

        .container {
            width: 100%; max-width: 600px;
            padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .card {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; padding: 40px;
            text-align: center; backdrop-filter: blur(12px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        header { margin-bottom: 30px; }
        h1 { margin: 0; font-size: 32px; font-weight: 800; letter-spacing: -1.5px; }
        .accent-text { color: var(--accent); }

        .subtitle { color: var(--muted); font-size: 14px; margin-top: 8px; }

        button {
            width: 100%; padding: 16px; margin-top: 10px;
            font-size: 16px; font-weight: 700; color: #fff;
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 14px; cursor: pointer; transition: .2s; outline: none;
        }
        button:hover:not(:disabled) {
            background: rgba(255,255,255,.1);
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        button:active:not(:disabled) { transform: scale(.97); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* The progress bar now mimics the FetchBox "Tricky" style */
        .prog-wrapper { margin: 30px 0 10px; display: none; }
        .progress-container {
            width: 100%; height: 6px; background: rgba(255,255,255,0.1);
            border-radius: 10px; overflow: hidden; margin-bottom: 10px;
        }
        .progress-bar {
            width: 0%; height: 100%; background: var(--accent);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 15px rgba(88, 166, 255, 0.5);
        }
        .status-msg { font-size: 13px; color: var(--accent); font-style: italic; animation: pulse 1.5s infinite; }

        @keyframes pulse { 50% { opacity: .5; } }

        #log {
            margin-top: 25px; text-align: left; font-size: 12px;
            max-height: 250px; overflow-y: auto; padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            color: #8b949e; border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-family: "JetBrains Mono", monospace;
            display: none; line-height: 1.6;
        }

        .log-line { border-bottom: 1px solid rgba(255,255,255,0.03); padding: 4px 0; }
        .log-line:last-child { border: none; }
        .prompt { color: var(--accent); margin-right: 8px; font-weight: bold; }

        #log::-webkit-scrollbar { width: 4px; }
        #log::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <header>
                <h1>Iași <span class="accent-text">SGR</span></h1>
                <p class="subtitle">Geospatial data extraction tool</p>
            </header>

            <button id="startBtn">Start Automation</button>

            <div class="prog-wrapper" id="progWrapper">
                <div class="progress-container">
                    <div class="progress-bar" id="progBar"></div>
                </div>
                <div id="status" class="status-msg">Initializing...</div>
            </div>

            <div id="log"></div>
        </div>
    </div>

    <script>
        const PROXY = "https://corsproxy.lmarkyos.workers.dev/?url=";
        const IASI = { lat: 47.1585, lon: 27.6014 };
        const RADIUS_KM = 15;

        const startBtn = document.getElementById('startBtn');
        const log = document.getElementById('log');
        const progWrapper = document.getElementById('progWrapper');
        const progBar = document.getElementById('progBar');
        const status = document.getElementById('status');

        function updateLog(msg) {
            log.style.display = 'block';
            const line = document.createElement('div');
            line.className = 'log-line';
            line.innerHTML = `<span class="prompt">>></span>${msg}`;
            log.appendChild(line);
            log.scrollTop = log.scrollHeight;
        }

        const getDist = (lat1, lon1, lat2, lon2) => {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        };

        function createGPX(locations) {
            let gpx = `<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="IașiMapper" xmlns="http://www.topografix.com/GPX/1/1">\n`;
            locations.forEach(loc => {
                const safeName = loc.name.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                gpx += `  <wpt lat="${loc.lat}" lon="${loc.lon}">\n    <name>${safeName}</name>\n    <desc>Status: ${loc.status}</desc>\n  </wpt>\n`;
            });
            gpx += `</gpx>`;
            return gpx;
        }

        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            log.innerHTML = "";
            progWrapper.style.display = 'block';
            progBar.style.width = "0%";

            try {
                updateLog("Handshaking with CORS proxy...");
                const listUrl = encodeURIComponent('https://sgrstatus.ro/wp-json/custom/v1/locations/');
                const res = await fetch(PROXY + listUrl);

                if (!res.ok) throw new Error("Connection Refused");

                const all = await res.json();
                updateLog("Parsing global location manifest...");

                const filtered = all.filter(loc =>
                    getDist(IASI.lat, IASI.lon, parseFloat(loc.latitude), parseFloat(loc.longitude)) <= RADIUS_KM
                );

                updateLog(`Filtered ${filtered.length} nodes in local radius.`);

                const finalData = [];

                for (let i = 0; i < filtered.length; i++) {
                    const loc = filtered[i];
                    const pct = Math.round(((i + 1) / filtered.length) * 100);
                    progBar.style.width = pct + "%";
                    status.innerText = `Fetching metadata: ${pct}%`;

                    try {
                        const infoUrl = encodeURIComponent(`https://sgrstatus.ro/wp-json/custom/v1/location_info/?lat=${loc.latitude}&lon=${loc.longitude}`);
                        const nameRes = await fetch(PROXY + infoUrl);
                        const nameData = await nameRes.json();

                        finalData.push({
                            lat: loc.latitude, lon: loc.longitude,
                            name: nameData.name || "SGR Node",
                            status: nameData.status || "Unknown"
                        });
                        updateLog(`Verified: ${nameData.name || 'SGR Node'}`);
                    } catch (e) {
                        updateLog(`Skip: ${loc.latitude}`);
                    }
                    await new Promise(r => setTimeout(r, 100));
                }

                updateLog("Compiling GPX structure...");
                const blob = new Blob([createGPX(finalData)], { type: 'application/gpx+xml' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = "iasi_sgr_map.gpx";
                link.click();

                updateLog("Process finished. Check downloads.");
                status.innerText = "Task Complete";
                status.style.animation = "none";
            } catch (err) {
                updateLog("CRITICAL ERROR: " + err.message);
                status.innerText = "Handshake Failed";
            } finally {
                startBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
