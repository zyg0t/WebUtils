<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SGR Extractor</title>
    <style>
        body { background: #121212; color: #eee; font-family: sans-serif; padding: 20px; }
        button { background: #333; color: #fff; border: 1px solid #555; padding: 8px 12px; cursor: pointer; margin: 5px 2px; }
        button:hover { background: #444; }
        #log { font-family: monospace; font-size: 12px; background: #000; padding: 10px; height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
    <h2>SGR Data</h2>
    <button id="startBtn">Extract Data</button>
    <span id="status">Idle</span>

    <div id="dl" style="display:none; margin-top:10px;">
        <button onclick="save('gpx')">GPX</button>
        <button onclick="save('csv')">CSV</button>
        <button onclick="save('json')">GeoJSON</button>
    </div>

    <pre id="log"></pre>

    <script>
        const PROXY = "https://corsproxy.lmarkyos.workers.dev/?url=", IASI = { lat: 47.1585, lon: 27.6014 }, RAD = 15;
        let data = [];

        const log = (m) => document.getElementById('log').innerText += `> ${m}\n`;
        const dist = (la1, lo1, la2, lo2) => {
            const p = Math.PI / 180, a = 0.5 - Math.cos((la2 - la1) * p)/2 + Math.cos(la1 * p) * Math.cos(la2 * p) * (1 - Math.cos((lo2 - lo1) * p))/2;
            return 12742 * Math.asin(Math.sqrt(a));
        };

        document.getElementById('startBtn').onclick = async () => {
            document.getElementById('startBtn').disabled = true;
            try {
                log("Fetching...");
                const all = await (await fetch(PROXY + encodeURIComponent('https://sgrstatus.ro/wp-json/custom/v1/locations/'))).json();
                const filtered = all.filter(l => dist(IASI.lat, IASI.lon, l.latitude, l.longitude) <= RAD);

                for (let [i, l] of filtered.entries()) {
                    document.getElementById('status').innerText = `${i+1}/${filtered.length}`;
                    const res = await (await fetch(PROXY + encodeURIComponent(`https://sgrstatus.ro/wp-json/custom/v1/location_info/?lat=${l.latitude}&lon=${l.longitude}`))).json();
                    data.push({ lat: l.latitude, lon: l.longitude, name: res.name || "Node", status: res.status || "N/A" });
                }
                document.getElementById('dl').style.display = 'block';
                log("Done.");
            } catch (e) { log("Error: " + e.message); }
        };

        function save(type) {
            let content, mime, ext = type;
            if (type === 'gpx') {
                mime = 'application/gpx+xml';
                content = `<?xml version="1.1"?><gpx>${data.map(l => `<wpt lat="${l.lat}" lon="${l.lon}"><name>${l.name}</name></wpt>`).join('')}</gpx>`;
            } else if (type === 'csv') {
                mime = 'text/csv';
                content = "Name,Lat,Lon\n" + data.map(l => `"${l.name}",${l.lat},${l.lon}`).join('\n');
            } else {
                mime = 'application/json';
                content = JSON.stringify({type: "FeatureCollection", features: data.map(l => ({type: "Feature", geometry: {type: "Point", coordinates: [l.lon, l.lat]}, properties: l}))});
            }
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([content], { type: mime }));
            a.download = `sgr_data.${ext}`;
            a.click();
        }
    </script>
</body>
</html>
