<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGR Parser</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, header, main, .card, .input-row { display: flex; flex-direction: column; }
        body { background: #0a0a0a; color: #eaeaea; font-family: system-ui, sans-serif; padding: 20px; align-items: center; min-height: 100vh; }
        header, main { width: 100%; max-width: 600px; }
        header { flex-direction: row; justify-content: space-between; align-items: center; margin: 8px 0 15px; }
        h2 { font-size: 1.5rem; font-weight: 700; flex: 1; text-align: center; margin-right: 40px; color: #fff; }
        main { gap: 20px; }
        .header-btn { color: #aaa; padding: 8px; font-size: 1.3rem; text-decoration: none; }
        .header-btn:hover { color: #fff; }
        .card { background: #111; border: 1px solid #333; border-radius: 8px; padding: 20px; gap: 14px; }
        #video-container { width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 6px; overflow: hidden; display: none; }
        #webcam-video { width: 100%; height: 100%; object-fit: cover; }
        .input-row { flex-direction: row; gap: 10px; }
        .btn { flex: 1; padding: 12px; background: #222; color: #fff; border: 1px solid #333; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:hover { background: #333; }
        input { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-family: monospace; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; display: none; }
        th { color: #888; font-weight: 500; font-size: 14px; text-align: left; padding: 8px; }
        td { color: #eee; font-weight: bold; font-family: monospace; padding: 8px; }
        .error { color: #ff5555; background: #221111; padding: 10px; border-radius: 6px; display: none; font-size: 14px; }
        #toast { position: fixed; bottom: 20px; background: #222; color: #fff; padding: 10px 20px; border-radius: 20px; opacity: 0; transition: 0.3s; pointer-events: none; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

<header>
    <a href="https://zyg0t.github.io/WebUtils/" class="header-btn"><i class="fas fa-shapes"></i></a>
    <h2>SGR Parser</h2>
</header>

<main>
    <section class="card">
        <div id="video-container"><video id="webcam-video" playsinline></video></div>
        <div class="input-row">
            <button id="start-cam-btn" class="btn"><i class="fas fa-camera"></i> Camera</button>
        </div>
        <input type="text" id="barcodeInput" placeholder="Enter 28-digit code..." maxlength="28">
        <div id="errorMessage" class="error"></div>
        <table id="resultTable">
            <tr><th>Value:</th><td id="resAmount">-</td></tr>
            <tr><th>Items:</th><td id="resItems">-</td></tr>
            <tr><th>Time:</th><td id="resTime">-</td></tr>
        </table>
    </section>
</main>

<canvas id="qr-canvas" style="display: none;"></canvas>
<div id="toast"></div>

<script>
    let videoStream = null, animationFrameId = null;
    const video = document.getElementById('webcam-video');
    const canvas = document.getElementById('qr-canvas');
    const ctx = canvas.getContext('2d');

    function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    async function toggleCamera() {
        if (videoStream) {
            videoStream.getTracks().forEach(t => t.stop());
            cancelAnimationFrame(animationFrameId);
            videoStream = null;
            document.getElementById('video-container').style.display = "none";
            document.getElementById('start-cam-btn').innerHTML = '<i class="fas fa-camera"></i> Camera';
            return;
        }

        try {
            videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = videoStream;
            // The magic fix: ensure video is ready before showing
            video.onloadedmetadata = () => {
                video.play();
                document.getElementById('video-container').style.display = "block";
                document.getElementById('start-cam-btn').innerHTML = '<i class="fas fa-stop"></i> Stop';
                tick();
            };
        } catch (e) { toast("Camera Error"); }
    }

    function tick() {
        if (!videoStream) return;
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.height = video.videoHeight; canvas.width = video.videoWidth;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
            if (code) {
                document.getElementById('barcodeInput').value = code.data;
                process(code.data);
                toggleCamera();
                return;
            }
        }
        animationFrameId = requestAnimationFrame(tick);
    }

    function process(val) {
        if (val.length !== 28) return;
        const amt = (parseInt(val.substring(20, 24), 10) / 10).toFixed(2);
        document.getElementById('resAmount').textContent = amt + " RON";
        document.getElementById('resItems').textContent = Math.floor(amt / 0.5) + " pieces";
        document.getElementById('resTime').textContent = val.substring(14, 16) + ":" + val.substring(16, 18);
        document.getElementById('resultTable').style.display = 'table';
    }

    document.getElementById('start-cam-btn').onclick = toggleCamera;
    document.getElementById('barcodeInput').oninput = (e) => process(e.target.value);
</script>
</body>
</html>
