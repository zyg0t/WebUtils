<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📍 Iași SGR Automation</title>
    <style>
        :root {
            --accent: #58a6ff;
            --bg: #0d1117;
            --card: rgba(22, 27, 34, 0.9);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e6e6e6;
            --muted: #8b949e;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top, #161b22, var(--bg));
            color: var(--text);
            display: grid;
            place-items: center;
            min-height: 100vh;
            line-height: 1.5;
        }

        .card {
            width: 90%;
            max-width: 500px;
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            text-align: center;
        }

        h1 { margin: 0; font-size: 2rem; letter-spacing: -1px; }
        .accent { color: var(--accent); }
        .subtitle { color: var(--muted); font-size: 0.9rem; margin: 0.5rem 0 2rem; }

        button {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover:not(:disabled) { transform: translateY(-2px); opacity: 0.9; }
        button:disabled { background: var(--muted); cursor: not-allowed; opacity: 0.5; }

        .prog-wrapper { margin-top: 2rem; display: none; }
        .progress-bg { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
        #progBar { height: 100%; width: 0; background: var(--accent); transition: 0.4s; box-shadow: 0 0 10px var(--accent); }
        #status { font-size: 0.8rem; color: var(--accent); margin-top: 0.8rem; font-style: italic; }

        #log {
            margin-top: 1.5rem;
            background: #010409;
            border-radius: 12px;
            padding: 1rem;
            height: 200px;
            overflow-y: auto;
            text-align: left;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            border: 1px solid var(--border);
            display: none;
        }

        .log-line { margin-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .log-line b { color: var(--accent); margin-right: 5px; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Iași <span class="accent">SGR</span></h1>
        <p class="subtitle">Geospatial data extraction tool</p>

        <button id="startBtn">Initialize Extraction</button>

        <div class="prog-wrapper" id="progWrapper">
            <div class="progress-bg"><div id="progBar"></div></div>
            <div id="status">Waiting for link...</div>
        </div>

        <div id="log"></div>
    </div>

    <script>
        const PROXY = "https://corsproxy.lmarkyos.workers.dev/?url=";
        const IASI = { lat: 47.1585, lon: 27.6014 };
        const RADIUS_KM = 15;

        const ui = {
            btn: document.getElementById('startBtn'),
            log: document.getElementById('log'),
            prog: document.getElementById('progWrapper'),
            bar: document.getElementById('progBar'),
            status: document.getElementById('status')
        };

        const updateLog = (msg) => {
            ui.log.style.display = 'block';
            ui.log.innerHTML += `<div class="log-line"><b>&gt;</b> ${msg}</div>`;
            ui.log.scrollTop = ui.log.scrollHeight;
        };

        const getDist = (lat1, lon1, lat2, lon2) => {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        };

        const createGPX = (locs) => {
            let gpx = `<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" xmlns="http://www.topografix.com/GPX/1/1">`;
            locs.forEach(l => {
                gpx += `<wpt lat="${l.lat}" lon="${l.lon}"><name>${l.name.replace(/[&<>]/g, '')}</name><desc>Status: ${l.status}</desc></wpt>`;
            });
            return gpx + `</gpx>`;
        };

        ui.btn.onclick = async () => {
            ui.btn.disabled = true;
            ui.log.innerHTML = ui.prog.style.display = 'block';

            try {
                updateLog("Connecting to SGR manifest...");
                const res = await fetch(PROXY + encodeURIComponent('https://sgrstatus.ro/wp-json/custom/v1/locations/'));
                const all = await res.json();

                const filtered = all.filter(l => getDist(IASI.lat, IASI.lon, l.latitude, l.longitude) <= RADIUS_KM);
                updateLog(`Found ${filtered.length} nodes in range.`);

                const results = [];
                for (let i = 0; i < filtered.length; i++) {
                    const l = filtered[i];
                    const pct = Math.round(((i + 1) / filtered.length) * 100);
                    ui.bar.style.width = `${pct}%`;
                    ui.status.innerText = `Fetching: ${pct}%`;

                    try {
                        const info = await (await fetch(PROXY + encodeURIComponent(`https://sgrstatus.ro/wp-json/custom/v1/location_info/?lat=${l.latitude}&lon=${l.longitude}`))).json();
                        results.push({ lat: l.latitude, lon: l.longitude, name: info.name || "Node", status: info.status || "N/A" });
                        updateLog(`Mapped: ${info.name}`);
                    } catch { updateLog(`Error at ${l.latitude}`); }
                }

                const blob = new Blob([createGPX(results)], { type: 'application/gpx+xml' });
                const link = Object.assign(document.createElement("a"), { href: URL.createObjectURL(blob), download: "iasi_sgr.gpx" });
                link.click();

                ui.status.innerText = "Complete!";
            } catch (e) {
                updateLog("Fail: " + e.message);
                ui.status.innerText = "Error encountered";
            } finally {
                ui.btn.disabled = false;
            }
        };
    </script>
</body>
</html>
