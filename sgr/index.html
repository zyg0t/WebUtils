<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGR Extractor</title>
  <style>
    * { box-sizing: border-box; }
    body {
      background: #0a0a0a; color: #eaeaea;
      font-family: system-ui, sans-serif;
      margin: 0; padding: 15px;
      height: 100vh; display: flex; flex-direction: column;
    }
    h2 { margin: 8px 0 15px; text-align: center; }
    button {
      padding: 12px 18px; background: #222; color: white;
      border: none; border-radius: 8px; font-size: 15px; cursor: pointer;
    }
    button:hover { background: #333; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { color: #aaa; margin-left: 10px; }
    #log {
      flex: 1; margin: 12px 0;
      background: #111; border: 1px solid #333;
      border-radius: 8px; padding: 12px;
      font-family: monospace; font-size: 14px;
      overflow-y: auto; white-space: pre-wrap;
    }
    .dl { display: none; gap: 8px; flex-wrap: wrap; }
    .dl button { flex: 1; min-width: 110px; }
  </style>
</head>
<body>
  <h2>SGR Extractor</h2>
  
  <div>
    <button id="startBtn">Extract Data</button>
    <span id="status">Idle</span>
  </div>

  <pre id="log">Ready...</pre>

  <div class="dl" id="dl">
    <button onclick="save('gpx')">GPX</button>
    <button onclick="save('csv')">CSV</button>
    <button onclick="save('json')">GeoJSON</button>
  </div>

  <script>
    const PROXY = "https://corsproxy.lmarkyos.workers.dev/?url=";
    const IASI = { lat: 47.1585, lon: 27.6014 }, RAD = 15;
    let data = [];

    const log = m => {
      const el = document.getElementById('log');
      el.textContent += `> ${m}\n`;
      el.scrollTop = el.scrollHeight;
    };

    const dist = (la1,lo1,la2,lo2) => {
      const p = Math.PI/180;
      const a = 0.5-Math.cos((la2-la1)*p)/2 + Math.cos(la1*p)*Math.cos(la2*p)*(1-Math.cos((lo2-lo1)*p))/2;
      return 12742 * Math.asin(Math.sqrt(a));
    };

    document.getElementById('startBtn').onclick = async () => {
      const btn = document.getElementById('startBtn');
      btn.disabled = true;
      document.getElementById('dl').style.display = 'none';
      document.getElementById('log').textContent = '';
      data = [];

      try {
        log("Fetching...");
        const all = await (await fetch(PROXY + encodeURIComponent('https://sgrstatus.ro/wp-json/custom/v1/locations/'))).json();
        const filtered = all.filter(l => dist(IASI.lat, IASI.lon, l.latitude, l.longitude) <= RAD);
        
        log(`Found ${filtered.length} nodes.`);

        for (let [i,l] of filtered.entries()) {
          document.getElementById('status').innerText = `${i+1}/${filtered.length}`;
          const res = await (await fetch(PROXY + encodeURIComponent(`https://sgrstatus.ro/wp-json/custom/v1/location_info/?lat=${l.latitude}&lon=${l.longitude}`))).json();
          data.push({name: res.name||"Node", status: res.status||"N/A", lat: l.latitude, lon: l.longitude});
          log(res.name || "Node");
        }

        document.getElementById('dl').style.display = 'flex';
        log("Done.");
      } catch(e) { log("Error: "+e.message); }
      finally { 
        btn.disabled = false; 
        document.getElementById('status').innerText = 'Idle';
      }
    };

    function save(t) {
      let c, m, f = `sgr_data.${t}`;
      if (t==='gpx') {
        m = 'application/gpx+xml';
        c = `<?xml version="1.1"?><gpx>${data.map(l=>`<wpt lat="${l.lat}" lon="${l.lon}"><name>${l.name}</name></wpt>`).join('')}</gpx>`;
      } else if (t==='csv') {
        m = 'text/csv';
        c = "Name,Status,Lat,Lon\n" + data.map(l=>`"${l.name}","${l.status}",${l.lat},${l.lon}`).join('\n');
      } else {
        m = 'application/json';
        c = JSON.stringify({type:"FeatureCollection", features:data.map(l=>({type:"Feature", geometry:{type:"Point", coordinates:[l.lon,l.lat]}, properties:{name:l.name,status:l.status}}))});
      }
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([c],{type:m}));
      a.download = f; a.click();
    }
  </script>
</body>
</html>
